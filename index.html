<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's In My Bag</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>What's In My Bag</h1>
    </header>

    <main>

        <!-- ============================
             CLUB CARD TEMPLATE
             Duplicate this entire <div class="club-card"> block
             for each club you want to add.
        ============================= -->
        <div class="club-card">
            <img src="images/driver.png" alt="Driver" class="club-image">

            <div class="club-info">
                <h2 class="club-name">TaylorMade Qi10 LS Driver</h2>
                <p class="shaft-text">Fujikura Ventus Blue 6X</p>

                <!-- Optional shaft image -->
                <img src="images/ventus-blue.png" alt="Ventus Blue Shaft" class="shaft-image">
            </div>
        </div>

        <!-- Duplicate above block for more clubs -->

    </main>

</body>
</html>
